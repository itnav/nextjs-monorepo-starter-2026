# Documents: https://moonrepo.dev/docs/config/project

id: "database"
layer: "library"
stack: "backend"
tags:
  - "viteplus"

project:
  description: "Database - Drizzle ORM スキーマ定義とクライアント"

tasks:
  ##############
  ## Database ##
  ##############

  migration/generate:
    command: "drizzle-kit generate"
    inputs:
      - "drizzle.config.ts"
      - "tsconfig.json"
      - "src/**/*"
    outputs:
      - "src/migrations"
    options:
      cache: false

  migration/up:
    command: "drizzle-kit migrate"
    inputs:
      - "src/migrations/**/*"
    options:
      cache: false

  db/push:
    command: "drizzle-kit push"
    options:
      cache: false

  db/studio:
    command: "drizzle-kit studio"
    preset: "server"
