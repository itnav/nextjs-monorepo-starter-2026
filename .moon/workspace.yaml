# Documents: https://moonrepo.dev/docs/config/workspace

# yaml-language-server: $schema=./cache/schemas/workspace.json
$schema: "./cache/schemas/workspace.json"

projects:
  sources:
    root: "."
  globs:
    - "apps/**/moon.yaml"
    - "libs/**/moon.yaml"
    # _/ ディレクトリは品質チェック対象外
    - "!**/_/**/moon.yaml"

pipeline:
  installDependencies:
    - "node"

vcs:
  defaultBranch: "main"
